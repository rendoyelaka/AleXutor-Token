name: Build AleXutor

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AleXutor/AleXutor.csproj

      - name: Build (Debug check)
        run: dotnet build AleXutor/AleXutor.csproj --configuration Debug --no-restore

      - name: Publish — Single EXE (Release)
        run: |
          dotnet publish AleXutor/AleXutor.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --output ./publish

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: AleXutor-win-x64
          path: ./publish/AleXutor.exe
          retention-days: 30

      # ── Create GitHub Release on version tags (v1.0.0, v2.3.1, etc.) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: AleXutor ${{ github.ref_name }}
          body: |
            ## AleXutor ${{ github.ref_name }}

            Windows Automation Suite — AutoIt feature-equivalent tool built in C# / .NET 8.

            ### Download
            👇 Download **AleXutor.exe** below — no install required, runs standalone.

            ### Features
            - 🖱 Mouse automation (move, click, drag, scroll)
            - ⌨ Keyboard automation (Send, hotkeys, special keys)
            - 🪟 Window management (activate, minimize, maximize, move, close)
            - 📁 File & folder operations (copy, move, delete, read, write, list)
            - ⚙ Process manager (run, list, kill)
            - 📜 Built-in script runner (AutoIt-style .axs scripts)
          files: ./publish/AleXutor.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
